name: Canvasight plugin

on:
  push:
    paths:
      - ".github/workflows/canvasight-plugin.yml"
      - "plugins/canvasight/**"
  pull_request:
    paths:
      - ".github/workflows/canvasight-plugin.yml"
      - "plugins/canvasight/**"

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Node 20.19
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    defaults:
      run:
        working-directory: plugins/canvasight

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: plugins/canvasight/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check committed MCP bundle
        run: npm run check:mcp-bundle

      - name: Typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build

      - name: Verify MCP bundle build is reproducible
        run: git diff --exit-code -- mcp/server.mjs

      - name: Test clean plugin distribution
        run: npm run test:plugin-distribution

      - name: Probe MCP registration
        run: npm run diagnose:mcp

      - name: Test MCP runtime
        run: npm run test:mcp
